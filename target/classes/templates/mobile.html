<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso no permitido</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: "Poppins", sans-serif; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            background-color: #000; /* Fondo negro por si tarda en cargar el gif */
        }

        .background-gif {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            object-fit: cover;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 1.5rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 320px;
            width: 90%;
            border: 3px solid #c62828;
            position: relative;
            z-index: 10;
        }

        h1 { color: #c62828; font-size: 1.6rem; margin: 0.5rem 0; }
        p { color: #1f2937; font-size: 1rem; line-height: 1.4; margin: 10px 0; }
        .icon { font-size: 3rem; }
    </style>
</head>
<body>

    <img class="background-gif" src="https://media1.tenor.com/m/7YV8S8L3v60AAAAd/orang-utan-orang-utan-driving.gif" alt="Acceso denegado">
    
    <div class="overlay"></div>

    <div class="container">
        <div class="icon">🚫🚗</div>
        <h1>Acceso bloqueado</h1>
        <p>No se permite el acceso desde dispositivos móviles.</p>
        <p><strong>Por favor, DEJA DE HACER MONADAS.</strong></p>
    </div>

</body>
</html>
