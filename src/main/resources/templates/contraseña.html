<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cambiar Contraseña | Control de Asistencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <style>
        body { font-family: "Poppins", sans-serif; background: #f3f4f6; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: 80px auto; background: #fff; padding: 2rem; border-radius: 0.8rem; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        h2 { text-align: center; margin-bottom: 1.5rem; color: #111827; }
        label { display: block; margin-bottom: 0.25rem; font-weight: 500; color: #4b5563; }
        input { width: 100%; padding: 0.5rem 0.75rem; margin-bottom: 1rem; border: 1px solid #e5e7eb; border-radius: 0.5rem; font-size: 0.9rem; }
        button { background: #0d52f2; color: #fff; border: none; padding: 0.55rem 1rem; border-radius: 999px; cursor: pointer; font-size: 0.9rem; transition: background 0.2s; }
        button:hover { background: #0030a8; }
        .alert { padding: 0.6rem 0.75rem; border-radius: 0.6rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; font-size: 0.86rem; }
        .alert-success { background: #ecfdf3; color: #166534; border: 1px solid #bbf7d0; }
        .alert-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .alert i { font-size: 1rem; }
    </style>
</head>

<body>
    <div class="container">
        <h2>Cambiar Contraseña</h2>

        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}"></span>
        </div>
        <div th:if="${success}" class="alert alert-success">
            <i class="fas fa-check-circle"></i>
            <span th:text="${success}"></span>
        </div>

        <form th:action="@{/perfil/cambiar-contrasenia}" method="post">
            <label for="contraseniaActual">Contraseña Actual</label>
            <input type="password" id="contraseniaActual" name="contraseniaActual" required>

            <label for="nuevaContrasenia">Nueva Contraseña</label>
            <input type="password" id="nuevaContrasenia" name="nuevaContrasenia" required>

            <label for="confirmarContrasenia">Confirmar Nueva Contraseña</label>
            <input type="password" id="confirmarContrasenia" name="confirmarContrasenia" required>

            <button type="submit">Actualizar Contraseña</button>
        </form>
    </div>
</body>

</html>
